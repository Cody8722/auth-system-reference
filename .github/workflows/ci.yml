name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: node-express/package-lock.json
      - run: npm install --prefix node-express
      - run: npm run test:ci --prefix node-express

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r python-flask/requirements.txt -r python-flask/requirements-test.txt
      - run: pytest python-flask/tests/ --cov=python-flask --cov-report=term-missing -v
