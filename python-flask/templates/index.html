<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auth 參考系統 — Python</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, sans-serif; }
  .card { background: #fff; border: 1px solid #e5e7eb; }
</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<!-- 登入 Modal -->
<div id="login-modal" class="fixed inset-0 bg-gray-900 bg-opacity-90 flex items-center justify-center z-50">
  <div class="card p-8 rounded-lg shadow-xl w-11/12 max-w-sm">
    <h2 class="text-2xl font-bold mb-1 text-center">Auth 參考系統</h2>
    <p class="text-sm text-gray-500 text-center mb-6">Python + Flask 實作</p>
    <form id="login-form" onsubmit="return false;">
      <div class="mb-3">
        <input id="login-email-input" type="email" placeholder="Email"
          class="w-full p-3 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
          autocomplete="username" />
      </div>
      <div class="mb-4">
        <input id="login-password-input" type="password" placeholder="密碼"
          class="w-full p-3 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
          autocomplete="current-password" />
      </div>
      <p id="login-error-msg" class="text-red-500 text-sm text-center mb-3 hidden"></p>
      <button id="login-submit-btn" type="submit"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-md transition">
        登入
      </button>
      <p class="text-center mt-3 text-sm">
        <button type="button" id="forgot-password-btn" class="text-purple-600 hover:underline">忘記密碼？</button>
      </p>
    </form>
  </div>
</div>

<!-- 重設密碼 Modal -->
<div id="reset-password-modal" class="fixed inset-0 bg-gray-900 bg-opacity-90 flex items-center justify-center z-50 hidden">
  <div class="card p-8 rounded-lg shadow-xl w-11/12 max-w-sm">
    <h2 class="text-2xl font-bold mb-2 text-center">設定新密碼</h2>
    <form id="reset-password-form" onsubmit="return false;">
      <input type="text" autocomplete="username" style="display:none" aria-hidden="true" />
      <div class="mb-3">
        <input id="reset-new-password" type="password" placeholder="新密碼"
          class="w-full p-3 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
          autocomplete="new-password" />
      </div>
      <div class="mb-4">
        <input id="reset-confirm-password" type="password" placeholder="確認新密碼"
          class="w-full p-3 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
          autocomplete="new-password" />
      </div>
      <p id="reset-error-msg" class="text-red-500 text-sm text-center mb-3 hidden"></p>
      <button id="reset-submit-btn" type="submit"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-md transition">
        確認重設
      </button>
    </form>
  </div>
</div>

<!-- 登入成功畫面 -->
<div id="main-view" class="hidden w-full max-w-md">
  <div class="card p-8 rounded-lg shadow-xl text-center">
    <div class="text-green-500 text-5xl mb-4">✓</div>
    <h2 class="text-2xl font-bold mb-2">登入成功</h2>
    <p id="welcome-msg" class="text-gray-600 mb-6"></p>
    <div class="text-left bg-gray-50 rounded-md p-4 mb-6 text-sm">
      <p class="font-semibold mb-2 text-gray-700">登入資訊</p>
      <p id="user-email" class="text-gray-600"></p>
      <p id="user-name" class="text-gray-600"></p>
    </div>
    <div class="flex gap-3 justify-center">
      <button id="verify-btn"
        class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-md text-sm transition">
        驗證 Token
      </button>
      <button id="logout-btn"
        class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-md text-sm transition">
        登出
      </button>
    </div>
    <p id="verify-result" class="mt-3 text-sm text-gray-500 hidden"></p>
    <p class="mt-6 text-xs text-gray-400">Python + Flask ｜ accounting_db.users</p>
  </div>
</div>

<script>
const API = '/api';
let authToken = sessionStorage.getItem('authToken_py') || null;

const showLoginModal = (errorMsg) => {
    document.getElementById('login-modal').classList.remove('hidden');
    document.getElementById('main-view').classList.add('hidden');
    const errEl = document.getElementById('login-error-msg');
    if (errorMsg) { errEl.textContent = errorMsg; errEl.classList.remove('hidden'); }
    else errEl.classList.add('hidden');
    document.getElementById('login-password-input')?.focus();
};

const hideLoginModal = () => document.getElementById('login-modal').classList.add('hidden');

const showMainView = (user) => {
    hideLoginModal();
    document.getElementById('reset-password-modal').classList.add('hidden');
    document.getElementById('main-view').classList.remove('hidden');
    document.getElementById('welcome-msg').textContent = `歡迎回來，${user.name || user.email}！`;
    document.getElementById('user-email').textContent = `Email：${user.email}`;
    document.getElementById('user-name').textContent = `名稱：${user.name || '（未設定）'}`;
};

const doLogin = async () => {
    const email = document.getElementById('login-email-input').value.trim();
    const password = document.getElementById('login-password-input').value;
    if (!email || !password) { showLoginModal('請輸入 Email 和密碼'); return; }

    const btn = document.getElementById('login-submit-btn');
    btn.disabled = true; btn.textContent = '登入中...';
    try {
        const resp = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
        });
        const data = await resp.json();
        if (!resp.ok) {
            showLoginModal(data.message || data.error || '帳號或密碼錯誤');
        } else {
            authToken = data.token;
            sessionStorage.setItem('authToken_py', authToken);
            showMainView(data.user);
        }
    } catch {
        showLoginModal('無法連線到伺服器');
    } finally {
        btn.disabled = false; btn.textContent = '登入';
    }
};

const doForgotPassword = async () => {
    const email = document.getElementById('login-email-input').value.trim();
    if (!email) { showLoginModal('請先輸入 Email'); return; }
    const btn = document.getElementById('forgot-password-btn');
    btn.disabled = true; btn.textContent = '寄送中...';
    try {
        const resp = await fetch(`${API}/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
        });
        const data = await resp.json();
        showLoginModal(data.message || data.error || '');
    } catch {
        showLoginModal('無法連線到伺服器');
    } finally {
        btn.disabled = false; btn.textContent = '忘記密碼？';
    }
};

document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('login-form').addEventListener('submit', doLogin);
    document.getElementById('login-submit-btn').addEventListener('click', doLogin);
    document.getElementById('forgot-password-btn').addEventListener('click', doForgotPassword);

    document.getElementById('logout-btn')?.addEventListener('click', () => {
        authToken = null;
        sessionStorage.removeItem('authToken_py');
        showLoginModal();
    });

    document.getElementById('verify-btn')?.addEventListener('click', async () => {
        const resultEl = document.getElementById('verify-result');
        try {
            const resp = await fetch(`${API}/auth/verify`, {
                headers: { 'Authorization': `Bearer ${authToken}` },
            });
            const data = await resp.json();
            resultEl.textContent = resp.ok ? `✓ Token 有效（${data.user?.email}）` : `✗ ${data.error}`;
            resultEl.className = `mt-3 text-sm ${resp.ok ? 'text-green-600' : 'text-red-500'}`;
            resultEl.classList.remove('hidden');
        } catch {
            resultEl.textContent = '驗證失敗';
            resultEl.classList.remove('hidden');
        }
    });

    // 重設密碼 Token 流程
    const resetToken = new URLSearchParams(location.search).get('reset_token');
    if (resetToken) {
        document.getElementById('login-modal').classList.add('hidden');
        document.getElementById('reset-password-modal').classList.remove('hidden');
        document.getElementById('reset-password-form').addEventListener('submit', async () => {
            const newPwd = document.getElementById('reset-new-password').value;
            const confirmPwd = document.getElementById('reset-confirm-password').value;
            const errEl = document.getElementById('reset-error-msg');
            if (newPwd !== confirmPwd) { errEl.textContent = '兩次密碼不一致'; errEl.classList.remove('hidden'); return; }
            if (!newPwd) { errEl.textContent = '請輸入新密碼'; errEl.classList.remove('hidden'); return; }

            const btn = document.getElementById('reset-submit-btn');
            btn.disabled = true; btn.textContent = '重設中...';
            try {
                const resp = await fetch(`${API}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, new_password: newPwd }),
                });
                const data = await resp.json();
                if (!resp.ok) {
                    errEl.textContent = data.message || data.error || '重設失敗'; errEl.classList.remove('hidden');
                } else {
                    document.getElementById('reset-password-modal').classList.add('hidden');
                    history.replaceState({}, '', location.pathname);
                    showLoginModal(data.message);
                }
            } catch {
                errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('hidden');
            } finally {
                btn.disabled = false; btn.textContent = '確認重設';
            }
        });
        return;
    }

    // 啟動：判斷是否需要登入
    const statusResp = await fetch(`${API}/status`).catch(() => null);
    const statusData = await statusResp?.json().catch(() => null);

    if (statusData?.auth_required && authToken) {
        try {
            const resp = await fetch(`${API}/auth/verify`, {
                headers: { 'Authorization': `Bearer ${authToken}` },
            });
            if (resp.ok) {
                const data = await resp.json();
                showMainView(data.user);
                return;
            }
        } catch {}
        authToken = null;
        sessionStorage.removeItem('authToken_py');
    }

    showLoginModal();
});
</script>
</body>
</html>
